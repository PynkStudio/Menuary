<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="3600" viewBox="0 0 2400 3600">
  <defs>
    <style>
      .bg{fill:#f6f1e8}.frame{fill:#fffaf2;stroke:#d8cfc0;stroke-width:2}.ink{fill:#18231f}.muted{fill:#6f746d}.line{stroke:#d8cfc0;stroke-width:2}.accent{fill:#b8332e}.gold{fill:#c7a45a}.soft{fill:#efe5d5}.panel{fill:#ffffff;stroke:#d8cfc0;stroke-width:1.5}.dash{fill:none;stroke:#b8332e;stroke-width:2;stroke-dasharray:10 8}.small{font:500 22px Arial, sans-serif}.tiny{font:700 16px Arial, sans-serif;letter-spacing:.08em}.body{font:400 28px Arial, sans-serif}.h1{font:700 72px Georgia, serif}.h2{font:700 44px Georgia, serif}.h3{font:700 30px Arial, sans-serif}.mono{font:600 18px ui-monospace, SFMono-Regular, Menlo, monospace}.white{fill:#fffaf2}
    </style>
    <g id="menu-card-copy">
      <rect width="396" height="300" rx="10" class="panel"/>
      <rect x="22" y="22" width="352" height="140" rx="8" fill="#d7cab7"/>
      <text x="22" y="205" class="h3 ink">Nome voce</text>
      <text x="22" y="240" class="small muted">Descrizione ingredienti</text>
      <text x="298" y="274" class="h3 accent">€ 12</text>
    </g>
  </defs>
  <rect class="bg" width="2400" height="3600"/>

  <g id="cover-and-rules">
    <text x="96" y="105" class="tiny accent">MENUARY DESIGN TEMPLATE</text>
    <text x="96" y="170" class="h1 ink">Struttura sito con connettori</text>
    <text x="96" y="220" class="body muted">Importa questo SVG in Figma. Cambia estetica, composizione e immagini, ma mantieni leggibili i nomi connector.* e gli id indicati.</text>
    <rect x="96" y="270" width="700" height="135" rx="10" class="panel"/>
    <text x="126" y="322" class="h3 ink">Regola di handoff</text>
    <text x="126" y="365" class="small muted">I blocchi tratteggiati rossi indicano dati dinamici collegati a Menuary: recensioni, staff, orari, menu, sedi, contatti e CTA.</text>
  </g>

  <g id="desktop-frame" transform="translate(96 480)">
    <rect id="frame.desktop.homepage" class="frame" width="1440" height="3000" rx="18"/>
    <text x="34" y="-30" class="h2 ink">Desktop / Homepage 1440</text>

    <g id="section.navbar">
      <rect x="0" y="0" width="1440" height="92" fill="#18231f"/>
      <g id="connector.brand.logo">
        <rect x="48" y="26" width="42" height="42" rx="21" class="gold"/>
        <text x="104" y="55" class="small white">brand.logo</text>
      </g>
      <text id="connector.brand.name" x="250" y="56" class="small white">brand.name</text>
      <text x="1030" y="56" class="small white">Menu</text>
      <text x="1120" y="56" class="small white">Staff</text>
      <text x="1210" y="56" class="small white">Orari</text>
      <text x="1300" y="56" class="small white">Contatti</text>
    </g>

    <g id="section.hero" transform="translate(48 142)">
      <rect width="1344" height="620" rx="12" class="soft"/>
      <g id="connector.hero.image">
        <rect x="712" y="48" width="584" height="524" rx="10" fill="#d7cab7"/>
        <path d="M760 520 L930 340 L1048 452 L1130 382 L1250 520 Z" fill="#a99b87"/>
        <circle cx="1180" cy="162" r="54" fill="#fffaf2"/>
        <rect x="740" y="78" width="212" height="36" rx="18" class="dash"/>
        <text x="760" y="103" class="mono accent">connector.hero.image</text>
      </g>
      <text id="connector.hero.title" x="56" y="180" class="h1 ink">hero.title</text>
      <text id="connector.hero.subtitle" x="56" y="250" class="body muted">hero.subtitle con promessa, tono e categoria del locale.</text>
      <g id="connector.cta.primary">
        <rect x="56" y="318" width="250" height="64" rx="32" class="accent"/>
        <text x="92" y="359" class="small white">cta.primary</text>
      </g>
      <g id="connector.orders.entrypoint">
        <rect x="330" y="318" width="250" height="64" rx="32" fill="none" stroke="#18231f" stroke-width="2"/>
        <text x="362" y="359" class="small ink">orders.entrypoint</text>
      </g>
    </g>

    <g id="section.menu" transform="translate(48 842)">
      <text x="0" y="0" class="tiny accent">MENU / LISTINO</text>
      <text x="0" y="56" class="h2 ink">Categorie e voci dinamiche</text>
      <g id="connector.menu.categories" transform="translate(0 92)">
        <rect width="1344" height="76" rx="38" class="dash"/>
        <text x="34" y="48" class="mono accent">connector.menu.categories</text>
        <rect x="390" y="16" width="130" height="44" rx="22" class="accent"/>
        <rect x="540" y="16" width="130" height="44" rx="22" class="soft"/>
        <rect x="690" y="16" width="130" height="44" rx="22" class="soft"/>
      </g>
      <g id="connector.menu.items" transform="translate(0 208)">
        <rect width="1344" height="430" rx="12" class="dash"/>
        <text x="34" y="42" class="mono accent">connector.menu.items</text>
        <g transform="translate(34 78)">
          <rect width="396" height="300" rx="10" class="panel"/>
          <rect id="connector.menu.item.photo" x="22" y="22" width="352" height="140" rx="8" fill="#d7cab7"/>
          <text x="22" y="205" class="h3 ink">Nome voce</text>
          <text x="22" y="240" class="small muted">Descrizione ingredienti</text>
          <text id="connector.menu.item.price" x="298" y="274" class="h3 accent">€ 12</text>
        </g>
        <use href="#menu-card-copy" x="474" y="78"/>
        <use href="#menu-card-copy" x="914" y="78"/>
      </g>
    </g>

    <g id="section.reviews" transform="translate(48 1580)">
      <text x="0" y="0" class="tiny accent">GOOGLE BUSINESS</text>
      <text x="0" y="56" class="h2 ink">Recensioni</text>
      <g id="connector.reviews.summary">
        <rect x="0" y="92" width="300" height="290" rx="12" class="dash"/>
        <text x="28" y="138" class="mono accent">reviews.summary</text>
        <text x="42" y="220" class="h1 ink">4.8</text>
        <text x="42" y="270" class="small muted">media Google</text>
      </g>
      <g id="connector.reviews.list">
        <rect x="336" y="92" width="1008" height="290" rx="12" class="dash"/>
        <text x="364" y="138" class="mono accent">connector.reviews.list</text>
        <rect x="364" y="178" width="280" height="150" rx="10" class="panel"/>
        <rect x="680" y="178" width="280" height="150" rx="10" class="panel"/>
        <rect x="996" y="178" width="280" height="150" rx="10" class="panel"/>
      </g>
    </g>

    <g id="section.staff" transform="translate(48 2050)">
      <text x="0" y="0" class="tiny accent">TEAM</text>
      <text x="0" y="56" class="h2 ink">Staff</text>
      <g id="connector.staff.grid">
        <rect x="0" y="92" width="1344" height="340" rx="12" class="dash"/>
        <text x="34" y="138" class="mono accent">connector.staff.grid</text>
        <g transform="translate(34 176)">
          <circle id="connector.staff.member.photo" cx="70" cy="70" r="70" fill="#d7cab7"/>
          <text x="170" y="55" class="h3 ink">Nome membro</text>
          <text id="connector.staff.member.role" x="170" y="94" class="small muted">staff.member.role</text>
        </g>
        <g transform="translate(520 176)">
          <circle cx="70" cy="70" r="70" fill="#d7cab7"/>
          <text x="170" y="55" class="h3 ink">Nome membro</text>
          <text x="170" y="94" class="small muted">Ruolo</text>
        </g>
      </g>
    </g>

    <g id="section.info" transform="translate(48 2570)">
      <g id="connector.hours.week">
        <rect x="0" y="0" width="416" height="320" rx="12" class="dash"/>
        <text x="28" y="48" class="mono accent">connector.hours.week</text>
        <text x="28" y="106" class="small ink">Lun-Ven 12:00-15:00 / 19:00-23:00</text>
        <text id="connector.hours.special" x="28" y="148" class="small muted">hours.special</text>
      </g>
      <g id="connector.locations.list">
        <rect x="464" y="0" width="416" height="320" rx="12" class="dash"/>
        <text x="492" y="48" class="mono accent">connector.locations.list</text>
        <rect id="connector.location.map" x="492" y="82" width="360" height="150" rx="8" fill="#d7cab7"/>
        <text x="492" y="272" class="small muted">location.map + indirizzo</text>
      </g>
      <g id="connector.contact">
        <rect x="928" y="0" width="416" height="320" rx="12" class="dash"/>
        <text x="956" y="48" class="mono accent">connector.contact.*</text>
        <text id="connector.contact.phone" x="956" y="110" class="small ink">contact.phone</text>
        <text id="connector.contact.whatsapp" x="956" y="152" class="small ink">contact.whatsapp</text>
        <text id="connector.contact.email" x="956" y="194" class="small ink">contact.email</text>
        <text id="connector.social.links" x="956" y="236" class="small muted">social.links</text>
      </g>
    </g>

    <g id="section.footer" transform="translate(0 2920)">
      <rect width="1440" height="80" fill="#18231f"/>
      <text id="connector.footer.legal" x="48" y="50" class="small white">footer.legal</text>
    </g>
  </g>

  <g id="mobile-frame" transform="translate(1640 480)">
    <rect id="frame.mobile.homepage" class="frame" width="390" height="2600" rx="28"/>
    <text x="0" y="-30" class="h2 ink">Mobile / 390</text>
    <rect width="390" height="74" rx="28" fill="#18231f"/>
    <text x="24" y="45" class="small white">brand.logo</text>
    <text x="258" y="45" class="small white">Menu</text>
    <g id="mobile.connector.hero" transform="translate(20 110)">
      <rect width="350" height="420" rx="12" class="soft"/>
      <text x="24" y="70" class="h2 ink">hero.title</text>
      <text x="24" y="125" class="small muted">hero.subtitle</text>
      <rect x="24" y="170" width="180" height="54" rx="27" class="accent"/>
      <text x="52" y="204" class="small white">cta.primary</text>
      <rect x="24" y="250" width="302" height="130" rx="10" class="dash"/>
      <text x="44" y="322" class="mono accent">hero.image</text>
    </g>
    <g id="mobile.connector.menu" transform="translate(20 590)">
      <text x="0" y="0" class="tiny accent">MENU</text>
      <rect x="0" y="32" width="350" height="64" rx="32" class="dash"/>
      <text x="20" y="72" class="mono accent">menu.categories</text>
      <rect x="0" y="126" width="350" height="520" rx="12" class="dash"/>
      <text x="20" y="170" class="mono accent">menu.items</text>
      <rect x="20" y="205" width="310" height="175" rx="10" class="panel"/>
      <rect x="20" y="400" width="310" height="175" rx="10" class="panel"/>
    </g>
    <g id="mobile.connector.reviews" transform="translate(20 1290)">
      <text x="0" y="0" class="tiny accent">REVIEWS</text>
      <rect x="0" y="32" width="350" height="300" rx="12" class="dash"/>
      <text x="20" y="82" class="mono accent">reviews.summary/list</text>
    </g>
    <g id="mobile.connector.staff" transform="translate(20 1670)">
      <text x="0" y="0" class="tiny accent">STAFF</text>
      <rect x="0" y="32" width="350" height="300" rx="12" class="dash"/>
      <text x="20" y="82" class="mono accent">staff.grid</text>
    </g>
    <g id="mobile.connector.info" transform="translate(20 2050)">
      <rect x="0" y="0" width="350" height="420" rx="12" class="dash"/>
      <text x="20" y="50" class="mono accent">hours.week</text>
      <text x="20" y="108" class="mono accent">locations.list</text>
      <text x="20" y="166" class="mono accent">contact.phone</text>
      <text x="20" y="224" class="mono accent">booking.form</text>
    </g>
  </g>

  <g id="connector-library" transform="translate(1640 3180)">
    <text x="0" y="0" class="h2 ink">Connector checklist</text>
    <text x="0" y="56" class="small muted">Obbligatori: brand, hero, menu/listino, orari, contatti, footer. Opzionali: recensioni, staff, sedi multiple, prenotazioni, ordini online.</text>
    <text x="0" y="112" class="mono accent">brand.logo · hero.title · menu.items · reviews.list · staff.grid · hours.week · contact.whatsapp · booking.form</text>
  </g>
</svg>
